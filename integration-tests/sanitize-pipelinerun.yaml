---
# Tekton Pipeline for the sanitize-and-push-pipelinerun IntegrationTestScenario.
#
# Referenced by the IntegrationTestScenario configured in the Konflux UI:
#   Application:  konflux-test-integration
#   Repo:         https://github.com/redhat-appstudio-qe/konflux-test-integration
#   Revision:     main
#   Path in repo: integration-tests/sanitize-pipelinerun.yaml
#   Params:
#     TARGET_IMAGE_REPO: quay.io/redhat-appstudio-qe/konflux-test-integration
#
# What this pipeline does:
#   Finds the most recent build PipelineRun, sanitizes it (strips volatile and
#   cluster-specific fields), and pushes it as an OCI artifact to Quay so E2E
#   tests can reuse it for 24 hours without triggering a full rebuild.
#
#   Tags pushed:
#     :pipelinerun-latest           (overwritten on every nightly run)
#     :pipelinerun-YYYYMMDD-HHMMSS  (kept for rollback with datetime precision)
#
# Finalizer behaviour:
#   The push pipeline adds finalizer test.appstudio.openshift.io/pipelinerun to
#   the PipelineRun. This pipeline removes it ONLY on success so the PipelineRun
#   is preserved for investigation or retry on failure. If unrecoverable, trigger
#   a manual push-to-main build and remove the old finalizer manually.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sanitize-and-push-pipelinerun
spec:
  description: >
    Sanitizes the build PipelineRun produced by the push-to-main pipeline and
    pushes it as an OCI artifact to quay.io/redhat-appstudio-qe so E2E tests
    can reuse it for 24 hours, tagged :pipelinerun-latest and
    :pipelinerun-YYYYMMDD-HHMMSS. The finalizer on the source PipelineRun is
    only removed on success so the PipelineRun is preserved for retry on failure.
  params:
  - name: SNAPSHOT
    description: Name of the Konflux Snapshot being tested
    type: string
  - name: TARGET_IMAGE_REPO
    description: Quay repository for the cached PipelineRun OCI artifact
    type: string
    default: quay.io/redhat-appstudio-qe/konflux-test-integration
  results:
  - name: TEST_OUTPUT
    description: Konflux integration test result (JSON)
    value: $(tasks.sanitize-and-push.results.TEST_OUTPUT)
  tasks:
  - name: test-metadata
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/konflux-ci/tekton-integration-catalog.git
      - name: revision
        value: main
      - name: pathInRepo
        value: tasks/test-metadata/0.1/test-metadata.yaml
    params:
    - name: SNAPSHOT
      value: $(params.SNAPSHOT)
    - name: test-name
      value: sanitize-and-push-pipelinerun

  - name: sanitize-and-push
    runAfter:
    - test-metadata
    params:
    - name: TARGET_IMAGE_REPO
      value: $(params.TARGET_IMAGE_REPO)
    taskSpec:
      params:
      - name: TARGET_IMAGE_REPO
        type: string
      results:
      - name: TEST_OUTPUT
        description: Konflux integration test result (JSON)
      volumes:
      - name: workdir
        emptyDir: {}
      steps:
      - name: sanitize
        image: quay.io/konflux-ci/appstudio-utils:latest
        volumeMounts:
        - name: workdir
          mountPath: /workdir
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          COMPONENT_NAME="konflux-test-integration"

          echo "=== Finding most recent build PipelineRun ==="
          echo "Component: ${COMPONENT_NAME}"
          echo "Namespace: ${NAMESPACE}"

          PLR_NAME=$(kubectl get pipelinerun -n "${NAMESPACE}" \
            -l "appstudio.openshift.io/component=${COMPONENT_NAME}" \
            -l "pipelines.appstudio.openshift.io/type=build" \
            --sort-by=.metadata.creationTimestamp \
            -o json | jq -r '.items[-1].metadata.name')

          if [[ -z "${PLR_NAME}" || "${PLR_NAME}" == "null" ]]; then
            echo "ERROR: No build PipelineRun found for component ${COMPONENT_NAME}" >&2
            exit 1
          fi
          echo "PipelineRun: ${PLR_NAME}"

          echo "=== Sanitizing PipelineRun ==="
          kubectl get pipelinerun -n "${NAMESPACE}" "${PLR_NAME}" -o json \
            | jq '
                del(
                  .metadata.uid,
                  .metadata.resourceVersion,
                  .metadata.generation,
                  .metadata.creationTimestamp,
                  .metadata.managedFields,
                  .metadata.ownerReferences,
                  .metadata.finalizers
                )
                | .metadata.labels = (
                    .metadata.labels
                    | with_entries(
                        select(.key | test(
                          "^test\\.appstudio\\.openshift\\.io/|^pac\\.test\\.appstudio\\.openshift\\.io/"
                        ) | not)
                      )
                  )
                | del(
                    .metadata.labels."appstudio.openshift.io/snapshot",
                    .metadata.labels."build.appstudio.redhat.com/pipeline"
                  )
                | .metadata.annotations = (
                    .metadata.annotations
                    | with_entries(
                        select(.key | test(
                          "^test\\.appstudio\\.openshift\\.io/|^pac\\.test\\.appstudio\\.openshift\\.io/"
                        ) | not)
                      )
                  )
                | .metadata.name = "konflux-test-integration-cached"
                | del(
                    .status.startTime,
                    .status.completionTime,
                    .status.childReferences,
                    .status.taskRuns,
                    .status.runs
                  )
              ' \
            > /workdir/sanitized-pipelinerun.json

          echo "Sanitized JSON written ($(wc -c < /workdir/sanitized-pipelinerun.json) bytes)"

      - name: push-oci-artifact
        image: ghcr.io/oras-project/oras:v1.2.0
        volumeMounts:
        - name: workdir
          mountPath: /workdir
        env:
        - name: TARGET_IMAGE_REPO
          value: $(params.TARGET_IMAGE_REPO)
        script: |
          #!/bin/sh
          set -eu

          DATETIME_TAG="pipelinerun-$(date +%Y%m%d-%H%M%S)"

          push_tag() {
            TAG="${1}"
            echo "=== Pushing :${TAG} ==="
            oras push \
              --artifact-type application/vnd.appstudio.pipelinerun+json \
              "${TARGET_IMAGE_REPO}:${TAG}" \
              /workdir/sanitized-pipelinerun.json:application/json
          }

          push_tag "pipelinerun-latest"
          push_tag "${DATETIME_TAG}"

          echo "OCI artifact pushed as :pipelinerun-latest and :${DATETIME_TAG}"

      - name: emit-result
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        script: |
          #!/usr/bin/env bash
          TIMESTAMP=$(date -u +%FT%TZ)
          printf '{"result":"SUCCESS","timestamp":"%s","failures":0,"warnings":0,"successes":1}' \
            "${TIMESTAMP}" \
            | tee $(results.TEST_OUTPUT.path)
          echo ""

  finally:
  - name: remove-finalizer
    # Only remove the finalizer if the push succeeded. On failure the
    # PipelineRun is intentionally preserved for investigation or retry.
    # If the PipelineRun is unrecoverable, trigger a manual push-to-main
    # build and manually remove the finalizer from the old one.
    when:
    - input: $(tasks.sanitize-and-push.status)
      operator: in
      values:
      - Succeeded
    params:
    - name: SNAPSHOT
      value: $(params.SNAPSHOT)
    taskSpec:
      params:
      - name: SNAPSHOT
        type: string
      steps:
      - name: patch
        image: quay.io/konflux-ci/appstudio-utils:latest
        env:
        - name: SNAPSHOT_NAME
          value: $(params.SNAPSHOT)
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          COMPONENT_NAME="konflux-test-integration"

          PIPELINERUN_NAME=$(kubectl get snapshot "${SNAPSHOT_NAME}" \
            -n "${NAMESPACE}" \
            -o jsonpath='{.metadata.annotations.appstudio\.openshift\.io/snapshot-source-pipelinerun}' \
            2>/dev/null || true)

          if [[ -z "${PIPELINERUN_NAME}" ]]; then
            echo "WARNING: snapshot ${SNAPSHOT_NAME} has no snapshot-source-pipelinerun annotation."
            echo "Falling back to label search for most recent build PipelineRun..."
            PIPELINERUN_NAME=$(kubectl get pipelinerun -n "${NAMESPACE}" \
              -l "appstudio.openshift.io/component=${COMPONENT_NAME}" \
              -l "pipelines.appstudio.openshift.io/type=build" \
              --sort-by=.metadata.creationTimestamp \
              -o json | jq -r '.items[-1].metadata.name')
          fi

          if [[ -z "${PIPELINERUN_NAME}" || "${PIPELINERUN_NAME}" == "null" ]]; then
            echo "WARNING: Could not find PipelineRun to remove finalizer from. Skipping."
            exit 0
          fi

          echo "Removing finalizer from PipelineRun ${PIPELINERUN_NAME}..."
          kubectl patch pipelinerun "${PIPELINERUN_NAME}" \
            -n "${NAMESPACE}" \
            --type=json \
            -p '[{"op":"remove","path":"/metadata/finalizers"}]' \
            2>/dev/null \
            && echo "Finalizer removed." \
            || echo "Finalizer already absent or PipelineRun gone; skipping."
